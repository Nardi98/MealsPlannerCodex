version: "3.9"

services:
  postgres:
    image: postgres:15
    env_file:
      - ./.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  backend:
    build: ./backend
    # run python in unbuffered mode (+ louder uvicorn logs)
    command: sh -c "alembic upgrade head && python -u -m uvicorn main:app --host 0.0.0.0 --port 8000 --log-level debug"
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - ./.env
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy

  frontend-v2:
    build: ./frontend-v2
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
