version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: mealplanner
      POSTGRES_PASSWORD: mealplanner
      POSTGRES_DB: mealplanner
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    # run python in unbuffered mode (+ louder uvicorn logs)
    command: python -u -m uvicorn main:app --host 0.0.0.0 --port 8000 --log-level debug
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql+psycopg2://mealplanner:mealplanner@postgres:5432/mealplanner
      - DB_AUTO_APPLY_MIGRATIONS=true
    volumes:
      - ./backend:/app
    depends_on:
      - postgres

  frontend-v2:
    build: ./frontend-v2
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
