version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=mealsdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d mealsdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    # On every compose, wipe + repopulate the DB with testing data, then serve.
    # run python in unbuffered mode (+ louder uvicorn logs)
    command: >
      sh -c "python -u scripts/seed_testing_data.py &&
             python -u -m uvicorn main:app --host 0.0.0.0 --port 8000 --log-level debug"
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://user:pass@db:5432/mealsdb
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend-v2:
    build: ./frontend-v2
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
