version: "3.9"

services:
  backend:
    build: ./backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  frontend-v2:
    # Vite-based frontend served on port 5174
    build: ./frontend-v2
    ports:
      - "5174:5174"
    depends_on:
      - backend

