version: "3.9"

services:
  backend:
    build: ./backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  frontend:
    # Vite-based frontend served on port 5173
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

